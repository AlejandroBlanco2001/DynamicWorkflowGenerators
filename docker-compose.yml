services:
  agents:
    build:
      context: .
      dockerfile: docker/dockerfile.agents
    ports:
      - "${AGENTS_PORT:-8000}:8000"
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENTS_PORT=${AGENTS_PORT:-8000}
      - API_PORT=${API_PORT:-3000}

  api:
    build:
      context: .
      dockerfile: docker/dockerfile.api
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - shared-db:/app
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - API_PORT=${API_PORT:-3000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  worker:
    build:
      context: .
      dockerfile: docker/dockerfile.worker
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - shared-db:/app
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  temporal:
    image: temporalio/temporal:latest
    container_name: temporal
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - temporal-data:/home/temporal
    command: server start-dev --ip 0.0.0.0
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  temporal-data:
  shared-db:
